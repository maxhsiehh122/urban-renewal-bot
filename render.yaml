services:
  - type: web
    name: urban-renewal-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:web_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        value: https://urban-renewal-bot.onrender.com
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
